<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!--/Web_Development/Practising/1-HTML%20Practising/3-Search.html-->
        <title>Google alapú kereső</title>
    </head>
    <!--https://nagraggini.github.io/Web-practising-and-fun/Web_Development/Practising/1-HTML%20Practising/3-Search.html-->
    <body>
        <h3>Keresés Google-ben</h3>
        <!--get= lekérünk -->
        <form
            method="get"
            action="https://www.google.com/search"
            autocomplete="off"
        >
            <!--A googleben q a kereső mező neve-->
            <input
                type="text"
                name="q"
                placeholder="Írja ide a keresett kifejezést!"
                maxlength="120"
            />
            <button type="submit">Keresés</button>
        </form>
    </body>
</html>
