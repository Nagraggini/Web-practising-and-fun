<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="styles.css" />
        <title>Tanulói névsor</title>
    </head>
    <body>
        <div class="container">
            <h1>Tanuló</h1>
            <p class="intro">
                A táblázatban tanulók adatait jelenítjük meg. A formázás a css
                fájlban lesz.
            </p>

            <table>
                <thead>
                    <tr>
                        <th>Név</th>
                        <th>Kor</th>
                        <th>Kedvenc tantárgy</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Harry Potter</td>
                        <td>11</td>
                        <td>Sötét varázslatok kivédése</td>
                    </tr>
                    <tr id="kiemelt">
                        <td>Hermione Granger</td>
                        <td>12</td>
                        <td>Bájitaltan</td>
                    </tr>
                    <tr>
                        <td>Ron Weasley</td>
                        <td>11</td>
                        <td>Kviddics</td>
                    </tr>
                </tbody>
            </table>

            <h2>Új tanuló hozzáadása</h2>
            <form>
                <div class="form-group">
                    <label for="nev">Név:</label>
                    <input type="text" id="nev" name="nev" required />
                </div>
                <div class="form-group">
                    <label for="kor">Kor:</label>
                    <input
                        type="number"
                        id="kor"
                        name="kor"
                        min="6"
                        max="99"
                        step="1"
                        required
                    />
                </div>

                <div class="form-group">
                    <label for="tantargy">Kedvenc tantárgy:</label>
                    <select name="tantargy" id="tantargy">
                        <option value="">-- Válassz tantárgyat</option>
                        <option value="Bájitaltan">Bájitaltan</option>
                        <option value="Kviddics">Kviddics</option>
                        <option value="Sötét varázslatok kivédése">
                            Sötét varázslatok kivédése
                        </option>
                        <option value="Ősvarázslat">Ősvarázslat</option>
                    </select>
                </div>
                <button type="sumbit">hozzáadás</button>
            </form>
        </div>
    </body>
</html>
